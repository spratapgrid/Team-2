version: '3.8'

services:
  postgres-tae:
    image: ankane/pgvector:v0.5.1
    container_name: forge-postgres-tae
    environment:
      POSTGRES_DB: forge_tae
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge_user -d forge_tae"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: